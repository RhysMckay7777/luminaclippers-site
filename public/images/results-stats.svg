<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 180" width="700" height="180">
  <defs>
    <linearGradient id="statsGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="700" height="180" fill="#0a0a0a"/>
  
  <!-- Border -->
  <rect x="10" y="10" width="680" height="160" rx="16" fill="#1a1a2e" stroke="url(#statsGrad)" stroke-width="2"/>
  
  <!-- Title -->
  <text x="350" y="45" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="16" font-weight="700">Lumina Clippers Results</text>
  
  <!-- Stat 1: Views -->
  <g transform="translate(80, 70)">
    <text x="0" y="30" fill="#6366f1" font-family="system-ui" font-size="36" font-weight="800">18B+</text>
    <text x="0" y="55" fill="#9ca3af" font-family="system-ui" font-size="12">Views Delivered</text>
  </g>
  
  <!-- Stat 2: Clippers -->
  <g transform="translate(260, 70)">
    <text x="0" y="30" fill="#8b5cf6" font-family="system-ui" font-size="36" font-weight="800">62,900+</text>
    <text x="0" y="55" fill="#9ca3af" font-family="system-ui" font-size="12">Active Clippers</text>
  </g>
  
  <!-- Stat 3: Monthly Views -->
  <g transform="translate(470, 70)">
    <text x="0" y="30" fill="#a855f7" font-family="system-ui" font-size="36" font-weight="800">10M+</text>
    <text x="0" y="55" fill="#9ca3af" font-family="system-ui" font-size="12">Monthly Views/Brand</text>
  </g>
  
  <!-- Bottom tagline -->
  <text x="350" y="155" text-anchor="middle" fill="#6b7280" font-family="system-ui" font-size="11">The Leading Clipping Agency for Brands — TikTok, Reels, Shorts, X</text>
</svg>