<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="200" fill="#0a0a0a"/>
  
  <!-- Step 1: Upload -->
  <rect x="30" y="40" width="200" height="120" rx="12" fill="#1a1a2e" stroke="#6366f1" stroke-width="2"/>
  <text x="130" y="75" text-anchor="middle" fill="#6366f1" font-family="system-ui" font-size="14" font-weight="600">STEP 1</text>
  <text x="130" y="105" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="16" font-weight="700">Upload Content</text>
  <text x="130" y="130" text-anchor="middle" fill="#9ca3af" font-family="system-ui" font-size="12">Podcasts, Videos, Webinars</text>
  
  <!-- Arrow 1 -->
  <path d="M240 100 L280 100" stroke="#6366f1" stroke-width="3" fill="none"/>
  <polygon points="280,95 295,100 280,105" fill="#6366f1"/>
  
  <!-- Step 2: AI Selection -->
  <rect x="300" y="40" width="200" height="120" rx="12" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="2"/>
  <text x="400" y="75" text-anchor="middle" fill="#8b5cf6" font-family="system-ui" font-size="14" font-weight="600">STEP 2</text>
  <text x="400" y="105" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="16" font-weight="700">AI Clip Selection</text>
  <text x="400" y="130" text-anchor="middle" fill="#9ca3af" font-family="system-ui" font-size="12">15-30 Viral Moments</text>
  
  <!-- Arrow 2 -->
  <path d="M510 100 L550 100" stroke="#8b5cf6" stroke-width="3" fill="none"/>
  <polygon points="550,95 565,100 550,105" fill="#8b5cf6"/>
  
  <!-- Step 3: Distribution -->
  <rect x="570" y="40" width="200" height="120" rx="12" fill="#1a1a2e" stroke="#a855f7" stroke-width="2"/>
  <text x="670" y="75" text-anchor="middle" fill="#a855f7" font-family="system-ui" font-size="14" font-weight="600">STEP 3</text>
  <text x="670" y="105" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="16" font-weight="700">Mass Distribution</text>
  <text x="670" y="130" text-anchor="middle" fill="#9ca3af" font-family="system-ui" font-size="12">62,900+ Clippers</text>
  
  <!-- Title -->
  <text x="400" y="185" text-anchor="middle" fill="#6b7280" font-family="system-ui" font-size="11">Lumina Clippers Content Distribution Process</text>
</svg>